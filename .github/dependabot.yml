version: 2
updates:
  - package-ecosystem: npm
    directory: '/'
    schedule:
      interval: monthly
    open-pull-requests-limit: 1
    groups:
      npm-dependencies:
        patterns:
          - '*'
    assignees:
      - CISCODE-MA/devops
    labels:
      - 'dependencies'
      - 'npm'
    commit-message:
      prefix: 'chore(deps)'
      include: 'scope'
    rebase-strategy: auto
