sonar.projectKey=CISCODE-MA_SchedulerKit
sonar.organization=ciscode

# Source code — spec files are excluded here and declared as tests below
sonar.sources=src
sonar.exclusions=src/**/*.spec.ts,src/**/*.test.ts

# Test files — both src specs and the integration test folder
sonar.tests=src,test
sonar.test.inclusions=src/**/*.spec.ts,src/**/*.test.ts,test/**/*.ts

# Coverage report produced by Jest
sonar.javascript.lcov.reportPaths=coverage/lcov.info
